<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Z-Stratified Hyperbolic Graph</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }

    #ui {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #00bcd4;
      font-family: 'Courier New', monospace;
      z-index: 10;
      background: rgba(0, 0, 0, 0.8);
      padding: 12px;
      border-left: 3px solid #00bcd4;
      pointer-events: none;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #hint {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #fff;
      font-family: sans-serif;
      z-index: 10;
      background: rgba(15, 15, 15, 0.95);
      padding: 15px;
      border: 1px solid #333;
      border-top: 3px solid #00bcd4;
      pointer-events: none;
      font-size: 13px;
      display: none;
      min-width: 250px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      max-width: 350px;
      word-wrap: break-word;
    }

    .hint-label {
      color: #888;
      font-size: 10px;
      margin-bottom: 4px;
      display: block;
    }

    .hint-value {
      color: #00bcd4;
      font-weight: bold;
      font-family: monospace;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div id="ui">
    Navigation: [WASD] + Mouse<br>
    Interaction: Click Node to Focus | Hover + Drag to Inspect
  </div>
  <div id="hint"></div>

  <a-scene background="color: #010101" antialias="true" cursor="rayOrigin: mouse" raycaster="objects: .clickable; far: 500000">
    <a-entity id="graph-container"></a-entity>

    <a-entity id="rig" position="0 0 15000">
      <a-camera id="main-cam" look-controls="pointerLockEnabled: false" wasd-controls="fly: true; acceleration: 5000" near="1" far="400000"
        smooth-focus>
      </a-camera>
    </a-entity>

    <a-light type="ambient" color="#AAA"></a-light>
    <a-light type="point" intensity="2" position="0 15000 15000"></a-light>
  </a-scene>

  <script>
    const HyperbolicTransformer = {
      camWorldPos: new THREE.Vector3(),
      camDir: new THREE.Vector3(),
      relVec: new THREE.Vector3(),
      projVec: new THREE.Vector3(),
      perpVec: new THREE.Vector3(),

      getDisplacedPos: function (initialPos, cameraObj, outVec) {
        cameraObj.getWorldPosition(this.camWorldPos);
        cameraObj.getWorldDirection(this.camDir);
        this.camDir.negate();

        this.relVec.subVectors(initialPos, this.camWorldPos);
        const distance = this.relVec.length();
        if (distance < 0.1) {
          outVec.copy(initialPos);
          return 0;
        }
        this.relVec.normalize();

        const alignment = Math.max(0, this.camDir.dot(this.relVec));
        const projLen = this.relVec.dot(this.camDir);

        this.projVec.copy(this.camDir).multiplyScalar(projLen);
        this.perpVec.subVectors(this.relVec, this.projVec);

        const spatialExpansion = 1.0 + Math.pow(alignment, 8) * 1.2;
        this.perpVec.multiplyScalar(spatialExpansion);

        this.relVec.addVectors(this.projVec, this.perpVec).normalize().multiplyScalar(distance);
        outVec.addVectors(this.camWorldPos, this.relVec);

        return alignment;
      }
    };

    window.nodeWorldPositions = {};
    window.nodeInitialPositions = {};
    window.adjacencyMap = {};
    window.highlightSet = new Set();
    window.nodeData = [];
    window.edgeData = [];

    window.isMouseDown = false;
    window.isMouseOverNode = false;
    window.activeNodeId = null;

    window.addEventListener('mousedown', () => { window.isMouseDown = true; });
    window.addEventListener('mouseup', () => {
      window.isMouseDown = false;
      if (!window.isMouseOverNode) {
        window.highlightSet.clear();
        window.activeNodeId = null;
        const hint = document.querySelector('#hint');
        if (hint) hint.style.display = 'none';
      }
    });

    AFRAME.registerComponent('smooth-focus', {
      init: function () {
        this.isAnimating = false;
        this.timer = 0;
        this.duration = 800;
        this.startPos = new THREE.Vector3();
        this.endPos = new THREE.Vector3();
        this.startYaw = 0;
        this.startPitch = 0;
        this.rig = document.querySelector('#rig');
      },
      start: function (targetPos) {
        const controls = this.el.components['look-controls'];
        this.startPos.copy(this.rig.object3D.position);
        // Offset is increased to prevent the camera from getting too close
        this.endPos.set(targetPos.x, targetPos.y, targetPos.z + 5000);
        this.startYaw = controls.yawObject.rotation.y;
        this.startPitch = controls.pitchObject.rotation.x;
        this.timer = 0;
        this.isAnimating = true;
      },
      tick: function (t, dt) {
        if (!this.isAnimating) return;
        this.timer += dt;
        let progress = Math.min(this.timer / this.duration, 1);
        let ease = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
        this.rig.object3D.position.lerpVectors(this.startPos, this.endPos, ease);
        const controls = this.el.components['look-controls'];
        controls.yawObject.rotation.y = this.startYaw * (1 - ease);
        controls.pitchObject.rotation.x = this.startPitch * (1 - ease);
        if (progress >= 1) this.isAnimating = false;
      }
    });

    AFRAME.registerComponent('hyperbolic-focal', {
      schema: {
        baseScale: { type: 'number', default: 1 },
        nodeId: { type: 'string' }
      },
      init: function () {
        this.camera = document.querySelector('#main-cam');
        this.initialPos = new THREE.Vector3().copy(this.el.object3D.position);
        window.nodeInitialPositions[this.data.nodeId] = this.initialPos;
        this.lookTarget = new THREE.Vector3();
        this.plate = this.el.querySelector('a-plane');
        this.label = this.el.querySelector('a-text');

        if (!window.nodeWorldPositions[this.data.nodeId]) {
          window.nodeWorldPositions[this.data.nodeId] = new THREE.Vector3().copy(this.el.object3D.position);
        }
      },
      tick: function () {
        if (!this.camera) return;
        const obj = this.el.object3D;
        const camObj = this.camera.object3D;
        const alignment = HyperbolicTransformer.getDisplacedPos(this.initialPos, camObj, obj.position);

        window.nodeWorldPositions[this.data.nodeId].copy(obj.position);

        const magnification = Math.min(2.2, Math.pow(alignment, 5) * 1.5 + 1);
        obj.scale.set(this.data.baseScale * magnification, this.data.baseScale * magnification, 1);

        const camWorldPos = new THREE.Vector3();
        camObj.getWorldPosition(camWorldPos);
        this.lookTarget.set(camWorldPos.x, obj.position.y, camWorldPos.z);
        obj.lookAt(this.lookTarget);

        let targetOpacity = 1.0;
        if (window.highlightSet.size > 0 && !window.highlightSet.has(this.data.nodeId)) {
          targetOpacity = 0.15;
        }
        if (this.plate) this.plate.setAttribute('material', 'opacity', targetOpacity);
        if (this.label) this.label.setAttribute('opacity', targetOpacity);
      }
    });

    AFRAME.registerComponent('dynamic-edge', {
      schema: { from: { type: 'string' }, to: { type: 'string' } },
      tick: function () {
        const pos1 = window.nodeWorldPositions[this.data.from];
        const pos2 = window.nodeWorldPositions[this.data.to];
        if (!pos1 || !pos2) return;

        let opacity = 0.35;
        if (window.highlightSet.size > 0) {
          opacity = (window.highlightSet.has(this.data.from) && window.highlightSet.has(this.data.to)) ? 0.8 : 0.04;
        }
        this.el.setAttribute('line', {
          start: `${pos1.x} ${pos1.y} ${pos1.z}`,
          end: `${pos2.x} ${pos2.y} ${pos2.z}`,
          color: '#00FFFF',
          opacity: opacity
        });
      }
    });

    const clusters = [
      { type: "SeqPath", count: 173, color: "#e3f2fd", center: [-8000, 0, 0] },
      { type: "Body", count: 220, color: "#bbdefb", center: [0, -8000, 2500] },
      { type: "Email", count: 152, color: "#fff9c4", center: [0, 8000, 5000] },
      { type: "Comment", count: 30, color: "#c8e6c9", center: [8000, 0, 7500] },
      { type: "Person", count: 24, color: "#f8bbd0", center: [0, 10000, 10000] }
    ];

    window.onload = function () {
      const container = document.querySelector('#graph-container');
      const camera = document.querySelector('#main-cam');
      const hint = document.querySelector('#hint');

      clusters.forEach(conf => {
        for (let i = 0; i < conf.count; i++) {
          const id = `${conf.type}_${i}`;
          const x = conf.center[0] + (Math.random() - 0.5) * 2500;
          const y = conf.center[1] + (Math.random() - 0.5) * 2500;
          const z = conf.center[2] + (i * 20);
          window.nodeData.push({ id, x, y, z, vx: 0, vy: 0, color: conf.color, type: conf.type, originX: conf.center[0], originY: conf.center[1] });
        }
      });

      const nodeIds = window.nodeData.map(d => d.id);
      for (let j = 0; j < 650; j++) {
        const sIdx = Math.floor(Math.random() * nodeIds.length);
        const tIdx = Math.floor(nodeIds.length * Math.pow(Math.random(), 3));
        if (sIdx !== tIdx) window.edgeData.push({ from: nodeIds[sIdx], to: nodeIds[tIdx] });
      }

      window.edgeData.forEach(e => {
        if (!window.adjacencyMap[e.from]) window.adjacencyMap[e.from] = [];
        if (!window.adjacencyMap[e.to]) window.adjacencyMap[e.to] = [];
        window.adjacencyMap[e.from].push(e.to);
        window.adjacencyMap[e.to].push(e.from);
      });

      const steps = 180;
      const separationK = 450;
      for (let s = 0; s < steps; s++) {
        for (let a = 0; a < window.nodeData.length; a++) {
          const nA = window.nodeData[a];
          for (let b = a + 1; b < window.nodeData.length; b++) {
            const nB = window.nodeData[b];
            const dx = nA.x - nB.x, dy = nA.y - nB.y;
            const dSq = dx * dx + dy * dy + 0.1;
            if (dSq < 8000000) {
              const f = (separationK * separationK) / Math.sqrt(dSq);
              nA.vx += (dx / Math.sqrt(dSq)) * f * 0.25; nA.vy += (dy / Math.sqrt(dSq)) * f * 0.25;
              nB.vx -= (dx / Math.sqrt(dSq)) * f * 0.25; nB.vy -= (dy / Math.sqrt(dSq)) * f * 0.25;
            }
          }
        }
        window.nodeData.forEach(d => {
          d.vx += (d.originX - d.x) * 0.15; d.vy += (d.originY - d.y) * 0.15;
          d.x += Math.max(-150, Math.min(150, d.vx)); d.y += Math.max(-150, Math.min(150, d.vy));
          d.vx *= 0.5; d.vy *= 0.5;
        });
      }

      window.nodeData.forEach(d => {
        const nodeEl = document.createElement('a-entity');
        nodeEl.setAttribute('id', d.id);
        nodeEl.setAttribute('position', `${d.x} ${d.y} ${d.z}`);
        nodeEl.setAttribute('hyperbolic-focal', { baseScale: 3.5, nodeId: d.id });

        const plate = document.createElement('a-plane');
        plate.setAttribute('class', 'clickable');
        plate.setAttribute('width', 60); plate.setAttribute('height', 36);
        plate.setAttribute('material', { color: d.color, shader: 'flat', transparent: true, opacity: 1.0 });

        const label = document.createElement('a-text');
        label.setAttribute('value', d.type);
        label.setAttribute('align', 'left'); label.setAttribute('anchor', 'left');
        label.setAttribute('wrap-count', 5); label.setAttribute('width', 54);
        label.setAttribute('position', `-27 0 0.5`); label.setAttribute('color', '#000');

        nodeEl.appendChild(plate); nodeEl.appendChild(label); container.appendChild(nodeEl);

        plate.addEventListener('mouseenter', () => {
          window.isMouseOverNode = true;
          if (window.isMouseDown) return;

          window.activeNodeId = d.id;
          hint.style.display = 'block';
          hint.innerHTML = `<span class="hint-label">IDENTITY</span><span class="hint-value">${d.id}</span><hr style="border:0; border-top:1px solid #333; margin:10px 0;"><span class="hint-label">TEMPORAL Z</span><span class="hint-value">${d.z.toFixed(0)}</span>`;

          window.highlightSet.clear();
          window.highlightSet.add(d.id);
          if (window.adjacencyMap[d.id]) window.adjacencyMap[d.id].forEach(n => window.highlightSet.add(n));
        });

        plate.addEventListener('mouseleave', () => {
          window.isMouseOverNode = false;
          if (!window.isMouseDown) {
            hint.style.display = 'none';
            window.highlightSet.clear();
            window.activeNodeId = null;
          }
        });

        plate.addEventListener('click', () => camera.components['smooth-focus'].start(window.nodeInitialPositions[d.id]));
      });

      setTimeout(() => {
        window.edgeData.forEach(edge => {
          const line = document.createElement('a-entity');
          line.setAttribute('dynamic-edge', { from: edge.from, to: edge.to });
          container.appendChild(line);
        });
      }, 2500);
    };
  </script>
</body>

</html>
