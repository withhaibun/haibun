<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muskeg Knowledge Graph</title>
  <meta name="description" content="Muskeg - Secure knowledge graph with access control">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; line-height: 1.6; padding: 8px 12px; }
    h1 { font-weight: normal; margin: 0; font-size: 18px; }
    header { display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #000; margin-bottom: 12px; padding-bottom: 8px; }
    .nav { display: flex; gap: 10px; }
    .nav a { background: #fff; color: #000; border: 1px solid #000; padding: 4px 10px; cursor: pointer; font-family: monospace; text-decoration: none; font-size: 13px; }
    .nav a:hover { background: #eee; }
    .nav a.active { background: #000; color: #fff; }
    .nav a.active:hover { background: #333; }
  </style>
</head>
<body>
  <div data-testid="muskeg-app">
    <header data-testid="muskeg-header">
      <h1>muskeg</h1>
      <nav class="nav" data-testid="muskeg-nav">
        <a href="#/type/Email" data-testid="nav-emails">Emails</a>
        <a href="#/query" data-testid="nav-query">Query</a>
      </nav>
    </header>
    <main id="muskeg-main" data-testid="muskeg-main">
    </main>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
