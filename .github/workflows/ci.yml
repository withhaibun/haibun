name: 'Haibun CI'

on:
  workflow_dispatch:
  push:
    branches:
      - 3.x
      - next
      - alpha
      - beta
      - rc
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install main deps
        run: npm ci

      - name: Install Playwright browsers and dependencies
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run e2e tests
        run: |
          cd e2e-tests
          npm ci
          npm test

  release:
    if: ${{ github.event_name == 'push' && contains(fromJSON('["3.x","next","alpha","beta","rc"]'), github.ref_name) }}
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: https://registry.npmjs.org

      - name: Remove deprecated npm always-auth config
        run: npm config delete always-auth || true

      - name: Install main deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify environment
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bash scripts/verify-environment.sh

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "ERROR: NPM_TOKEN is not set; cannot publish."
            exit 1
          fi
          npx semantic-release